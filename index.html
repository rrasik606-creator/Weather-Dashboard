<body>
    <button></button>
    <div id="main">

        <div class="search">
            <button class="toggle"><img src="lightmode.png" alt="search" class="toggleimg"></button>
            <input type="text" placeholder="Enter your city...">
            <button class="search-button"><img src="search.png" alt="search"></button>
        </div>

        <div class="weather-details">

            <div class="error">
             <p>Invalid city name...!</p>
            </div>

            <div class="weather">

                <div class="fav">
                <button class="favbutton"><img src="favoriteimg.png" alt="" class="favimg"></button>
                <p>Favourite</p>
                </div>

                <img src="rain.png" alt="rain" class="weather-icon">  
                <h1 class="temp">°C</h1>
                <h2 class="city">Cityname</h2>

                <div class="details">

                    <div class="col">
                        <img src="humidity.png" alt="humidity">

                        <div>                    
                        <p class="humidity">%</p>
                        <p>Humidity</p>
                        </div>
                    </div>

                    <div class="col">
                        <img src="wind.png" alt="wind">

                        <div>
                        <p class="windspeed">km/h</p>
                        <p>Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
